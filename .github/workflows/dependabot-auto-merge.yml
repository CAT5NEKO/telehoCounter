name: Dependabot Auto-merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge Dependabot patch updates
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip non-patch updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-patch'
        run: |
          echo "Update type is '${{ steps.metadata.outputs.update-type }}' — skipping auto-merge."

      - name: Update branch to latest base
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          STATUS=$(gh api \
            repos/${REPO}/pulls/${PR_NUMBER} \
            --jq '.mergeable_state')
          echo "Mergeable state: ${STATUS}"
          if [ "${STATUS}" = "behind" ]; then
            echo "Branch is behind base — updating..."
            gh pr update-branch "${PR_NUMBER}" --repo "${REPO}"
          else
            echo "Branch is already up to date."
          fi

      - name: Enable auto-merge (squash)
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
